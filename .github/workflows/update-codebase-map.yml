name: Update Codebase Architecture Map

on:
  push:
    branches:
      - main
      - master
    paths:
      # Trigger when actual source changes (not just map updates)
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "scripts/**"
      - "next.config.ts"
      - "tailwind.config.ts"
      - "tsconfig.json"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "prisma/**"
      - "package.json"
  workflow_dispatch:
    inputs:
      force:
        description: "Force full regeneration (skip hash check)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so hotspot analysis can inspect commit log
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate architecture map
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          node scripts/generate-architecture-map.mjs $FORCE_FLAG

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- docs/codebase-map.md docs/codebase-map.json docs/.map-state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated map
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/codebase-map.md docs/codebase-map.json docs/.map-state.json
          git commit -m "docs: auto-update codebase architecture map [skip ci]"
          git push

      - name: Upload map as artifact (on PRs)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: codebase-map
          path: |
            docs/codebase-map.md
            docs/codebase-map.json
          retention-days: 7
