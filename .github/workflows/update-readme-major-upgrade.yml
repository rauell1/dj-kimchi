name: Update README On Major Upgrade

on:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update README metadata
        run: node scripts/update-readme-major.mjs

      - name: Commit changes (if any)
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update README for version metadata"
          git push
